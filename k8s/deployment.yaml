apiVersion: apps/v1
kind: Deployment
metadata:
  name: __APP_NAME__
  namespace: __NAMESPACE__
  labels:
    app: __APP_NAME__
spec:
  replicas: __REPLICAS__
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: __APP_NAME__
  template:
    metadata:
      labels:
        app: __APP_NAME__
    spec:
      serviceAccountName: __SERVICE_ACCOUNT_NAME__
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
__IMAGE_PULL_SECRETS_BLOCK__
      containers:
        - name: __APP_NAME__
          image: __IMAGE__
          imagePullPolicy: __IMAGE_PULL_POLICY__
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          ports:
            - containerPort: __APP_PORT__
              name: http
          env:
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -XX:InitialRAMPercentage=25.0
                -XX:MaxRAMPercentage=70.0
                -XX:ActiveProcessorCount=2
                -XX:+UseContainerSupport
                -XX:+UseZGC
                -XX:MaxGCPauseMillis=1000
                -XX:+ExitOnOutOfMemoryError
          resources:
            requests:
              cpu: __CPU_REQUEST__
              memory: __MEMORY_REQUEST__
            limits:
              cpu: __CPU_LIMIT__
              memory: __MEMORY_LIMIT__
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
